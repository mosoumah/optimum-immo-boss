name: Security & Build CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'  # Weekly security scan

jobs:
  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔍 npm audit
        # Bloquant : échoue si une vulnérabilité moderate ou critique est trouvée
        run: npm audit --audit-level=moderate

      - name: 🔐 Check for hardcoded secrets in source
        # Bloquant : vérifie qu'aucune clé n'est hardcodée dans le code source
        run: |
          echo "Scanning for hardcoded Supabase keys..."
          if grep -rn "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\|sb_secret_\|sbp_" src/ \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx"; then
            echo ""
            echo "❌ ERREUR : Clé Supabase hardcodée détectée dans le code source !"
            echo "   → Utilisez import.meta.env.VITE_SUPABASE_* à la place"
            exit 1
          fi
          echo "✅ Aucune clé hardcodée détectée"

      - name: 🔐 Check .env is not tracked by git
        # Bloquant : vérifie que le .env n'est pas commité dans le repo
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo ""
            echo "❌ ERREUR : Le fichier .env est tracké par git !"
            echo "   → Exécutez : git rm --cached .env && git commit -m 'fix: remove .env'"
            exit 1
          fi
          echo "✅ Le fichier .env n'est pas tracké par git"

  lint:
    name: 📝 ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [security-audit, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

  summary:
    name: ✅ Pipeline Summary
    runs-on: ubuntu-latest
    needs: [security-audit, lint, build]
    if: always()

    steps:
      - name: 📊 Report Status
        run: |
          echo "════════════════════════════════════════════"
          echo "   🔐 OPTIMUM IMMO — CI/CD PIPELINE"
          echo "════════════════════════════════════════════"
          echo "Security audit : ${{ needs.security-audit.result }}"
          echo "ESLint         : ${{ needs.lint.result }}"
          echo "Build          : ${{ needs.build.result }}"
          echo "════════════════════════════════════════════"
          if [[ "${{ needs.security-audit.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Pipeline échoué — corrigez les erreurs avant de merger"
            exit 1
          fi
          echo "✅ Tous les checks sont passés !"
