name: Security & Build CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'  # Weekly security scan

jobs:
  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: 🔍 npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: 🔐 Check for hardcoded secrets
        run: |
          if grep -r "VITE_SUPABASE" src/ --include="*.ts" --include="*.tsx" | grep -v "process.env"; then
            echo "❌ Hardcoded secrets detected!"
            exit 1
          fi
        continue-on-error: true

  lint:
    name: 📝 ESLint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: 🏗️ Build
        run: npm run build

  summary:
    name: ✅ Security Summary
    runs-on: ubuntu-latest
    needs: [security-audit, lint, build]
    if: always()
    
    steps:
      - name: 📊 Report Status
        run: |
          echo "════════════════════════════════════════"
          echo "   🔐 SECURITY CHECK COMPLETED"
          echo "════════════════════════════════════════"
          echo "✅ All checks passed!"
